syntax = "proto3";

package google.pes.v1;

import "proto/google/pes/v1/verification_material.proto";

option java_multiple_files = true;
option java_outer_classname = "EndorsementProto";
option java_package = "com.google.pes.v1";

message PublicEndorsement {
  // Unique name of the endorsement created by the service
  // Format: endorsements/{endorsement}
  string name = 1;

  // Object representing In-toto statement describing artifacts
  Statement statement = 2;

  // A signature over statement.serialized generated by a publisher to verify
  // integrity and bind publisher key material to published artifact.
  Signature statement_signature = 3;

  // Endorser signature over:
  // PAE(statement.serialized, statement_signature, tlog_receipt.entry_id)
  // The PAE is calculated as follows:
  // PAE(`statement.serialized`, `statement_signature`, `entry_id`) =
  //   "PES" + ENCODE(`statement.serialized`) +
  //   ENCODE(`statement_signature.verification_material`) +
  //   ENCODE(`statement_signature.signature`) +
  //   ENCODE(`entry_id`)
  //
  // Where:
  // +            -> concatenation
  // // SP           -> ASCII space [0x20]
  // "PES"        -> ASCII [0x50, 0x45, 0x53]
  // LEN(obj)     -> ASCII decimal byte size of the obj
  // ENCODE(obj)  -> SP + LEN(obj) + SP + obj
  repeated Signature endorsement_signatures = 5;

  // Represents value returned by the TLog for client to verify if needed
  TLogReceipt tlog_receipt = 6;
}

// Represents in-toto statement of v1 schema. Only
// https://in-toto.io/Statement/v1 is supported
message Statement {
  enum Format {
    // Undefined and hence invalid format of the endorsement.
    FORMAT_UNSPECIFIED = 0;

    // JSON v1 in-toto statement.
    JSON_INTOTO = 1;
  }

  // Format of a serialized endorsement
  Format format = 1;

  // Serialized statement in a given format
  bytes serialized = 2;
}

// A wrapper for a single signature of byte data
message Signature {
  // An actual raw signature
  bytes signature = 1;

  // The material required to verify the authenticity of the signature.
  google.pes.v1.VerificationMaterial verification_material = 2;
}

// Represents a receipt from the TLog.
message TLogReceipt {
  // The unique identifier for the log entry returned by TLog.
  string entry_id = 1;
}
